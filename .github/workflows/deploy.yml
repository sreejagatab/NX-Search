name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to nx-search.jagatab.uk
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_NEURONX_API_KEY: ${{ secrets.VITE_NEURONX_API_KEY }}

      # ── Cloudflare Pages deploy (serves the live site + Functions) ──────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CF_PAGES_PROJECT_NAME }} --commit-dirty=true

      # ── Hetzner deploy (nginx Docker container, serves as origin fallback) ──
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_NEURONX_API_KEY=${{ secrets.VITE_NEURONX_API_KEY }} \
            -t nx-search:latest .
          docker save nx-search:latest | gzip > /tmp/nx-search.tar.gz
          echo "Image size: $(du -sh /tmp/nx-search.tar.gz | cut -f1)"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Upload Docker image to server
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/nx-search.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/nx-search.tar.gz

      - name: Deploy container
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            sudo docker load < /tmp/nx-search.tar.gz
            sudo docker stop deploy-nginx-1 2>/dev/null || true
            sudo docker rm   deploy-nginx-1 2>/dev/null || true
            sudo fuser -k 3002/tcp 2>/dev/null || true
            sudo docker run -d \
              --name deploy-nginx-1 \
              -p 3002:80 \
              --restart unless-stopped \
              nx-search:latest
            rm -f /tmp/nx-search.tar.gz
            sudo docker ps --filter name=deploy-nginx-1
          EOF
