version: '3.9'

services:
  nx-search:
    build:
      context: .
      args:
        VITE_NEURONX_API_KEY: ${VITE_NEURONX_API_KEY}
    ports:
      - "3002:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
