# HTTP → HTTPS redirect
server {
    listen 80;
    server_name nx-search.jagatab.uk;
    return 301 https://$host$request_uri;
}

# HTTPS — nx-search.jagatab.uk
server {
    listen 443 ssl http2;
    server_name nx-search.jagatab.uk;

    ssl_certificate     /etc/letsencrypt/live/nx-search.jagatab.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nx-search.jagatab.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /var/www/nx-search;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

    # Upstream timeouts — searches take 20–75s, LLM streaming can take 60s+
    proxy_read_timeout    180s;
    proxy_connect_timeout  30s;
    proxy_send_timeout    180s;

    # Proxy /api/ to NeuronX backend
    location /api/ {
        proxy_pass https://neuronx.jagatab.uk/api/;
        proxy_set_header Host neuronx.jagatab.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    # Proxy /v1/ (LLM SSE streaming)
    location /v1/ {
        proxy_pass https://neuronx.jagatab.uk/v1/;
        proxy_set_header Host neuronx.jagatab.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 180s;
    }

    # Static assets — long-lived cache (content-hashed filenames)
    location ~* \.(js|css|woff2|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # manifest + sw — short cache so updates propagate quickly
    location ~* \.(webmanifest|json)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
